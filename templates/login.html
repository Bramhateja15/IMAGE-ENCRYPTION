{% extends "index.html" %}
{% block content %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive User Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #142534, #490000);
            color: #fff;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: #ffffff;
            color: #000;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 50px auto;
            margin-bottom: 150px;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #490000;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #490000;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #490000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .btn:hover {
            background-color: #142534;
            color: white;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 15px;
            }

            .btn {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        {% if messages %}
        {% for message in messages %}
        <center><p class="alert alert-success">{{ message }}</p></center>
        {% endfor %}
        {% endif %}
        <h2>User Login</h2>

        <form action="{% url 'login' %}" enctype="multipart/form-data" method="post">
            {% csrf_token %}
       
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Select Authentication Method -->
            <div class="form-group">
                <label for="auth_method">Choose Authentication Method</label>
                <select id="auth_method" name="auth_method" required onchange="togglePasswordField()">
                    <option value="" selected disabled>Select Method</option>
                    <option value="password">Password</option>
                    <option value="face_auth">Face Authentication</option>
                </select>
            </div>

            <!-- Password Field (Only shown if 'password' is selected) -->
            <div class="form-group" id="password_field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>
        
        <a href="{% url 'register' %}" style="text-align: center;"><p>Don't Have an Account? Register</p></a>
        <a href="{% url 'forgotpass' %}" style="text-align: center;"><p>Forgot Password</p></a>
    </div>

    <script>
        function togglePasswordField() {
            var authMethod = document.getElementById("auth_method").value;
            var passwordField = document.getElementById("password_field");
            var passwordInput = document.getElementById("password");

            // Show password field if "password" is selected, otherwise hide it
            if (authMethod === "password") {
                passwordField.style.display = "block";
                passwordInput.setAttribute("required", "required"); // Make password field required
            } else {
                passwordField.style.display = "none";
                passwordInput.removeAttribute("required"); // Remove the required attribute when face auth is selected
            }
        }

        // Initialize visibility based on the selected option
        togglePasswordField();
    </script>
</body>
{% endblock %}
